server:
  host: "0.0.0.0"
  port: 8080
  workers: 1
  cors_origins: ["*"]
  api_keys: []
  max_image_size_mb: 20
  max_image_dimension: 8000

runtime:
  device: "cuda"       # cuda | cpu | tensorrt
  precision: "fp32"    # fp32 | fp16
  max_loaded_models: 5

logging:
  level: "INFO"
  format: "json"
